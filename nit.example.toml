[clipboard]
mode = "only_copy" # only_copy | auto | osc52 | system | internal
# copy_cmd = "wl-copy"
# paste_cmd = "wl-paste -n"

[ui]
# Top bar labels/icons (emoji style)
repo_label   = "📂"
branch_label = "🌱"
fetch_label  = "⇅ Fetch"
menu_label   = "≡"

# Monospace/ASCII examples (if emoji width looks misaligned)
# repo_label = "repo"
# branch_label = "branch"
# fetch_label = "[f] fetch"
# menu_label = "..."

# Nerd Font examples (if your terminal font supports them)
# repo_label = "󰉋"
# branch_label = ""
# fetch_label = "󰓦 fetch"
# menu_label = "⋯"

[keys.quit]
keys = ["ctrl+c", "q"]

[keys.toggle_panel]
keys = ["tab"]

[keys.focus_command]
keys = ["c"]

[keys.down]
keys = ["down", "j"]

[keys.up]
keys = ["up", "k"]

[keys.toggle_one]
keys = ["enter"]

[keys.stage_all]
keys = ["s"]

[keys.unstage_all]
keys = ["u"]

[keys.fetch]
keys = ["f"]

[keys.push]
keys = ["p", "ctrl+p"] # ctrl+p funciona incluso mientras escribes en Commit

[keys.commit_editor.submit]
keys = ["enter"]

[keys.commit_editor.cancel]
keys = ["esc"]

[keys.commit_editor.copy]
keys = ["ctrl+c"]

[keys.commit_editor.cut]
keys = ["ctrl+x"]

[keys.commit_editor.paste]
keys = ["ctrl+v"]

[keys.commit_editor.select_all]
keys = ["ctrl+a"]

[keys.commit_editor.backspace]
keys = ["backspace"]

[keys.commit_editor.delete]
keys = ["delete"]

[keys.commit_editor.left]
keys = ["left"]

[keys.commit_editor.right]
keys = ["right"]

[keys.commit_editor.home]
keys = ["home"]

[keys.commit_editor.end]
keys = ["end", "ctrl+e"]
